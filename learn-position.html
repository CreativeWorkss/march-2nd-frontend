<html>
  <head>
    <title>Learn Posistion</title>
    <style>
      .one {
        width: 800px;
        height: 150px;
        position: static;
        top: 200px;
        left: 200px;
        text-align: center;
        font-size: 100px;
        background-color: red;
      }
      .two {
        width: 800px;
        height: 150px;

        text-align: center;
        font-size: 100px;
        background-color: rgb(47, 187, 42);
      }

      .three {
        width: 800px;
        height: 150px;
        /*
        position: fixed;
        left: 200px;
        */

        position: sticky;
        top: 10px;
        text-align: center;
        font-size: 100px;

        background-color: rgb(20, 135, 230);
      }
      .four {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(255, 0, 128);
      }
      .five {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(6, 114, 42);
      }

      .six {
        width: 800px;
        height: 150px;
        text-align: center;
        font-size: 100px;
        background-color: rgb(230, 137, 24);
      }
    </style>
  </head>
  <body>
    <div class="one">1</div>
    <div class="two">2</div>
    <div class="three">3</div>
    <div class="four">4</div>
    <div class="five">5</div>
    <div class="six">6</div>
  </body>
</html>

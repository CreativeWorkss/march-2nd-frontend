<html>
  <head>
    <title>Hello flex</title>
    <style>
      .one {
        height: 200px;
        width: 400px;
        background-color: aqua;
        border: 2px solid black;
        font-size: 200px;
        text-align: center;
      }

      .two {
        height: 200px;
        width: 400px;
        background-color: rgb(97, 228, 45);
        border: 2px solid black;
        font-size: 200px;
        text-align: center;
      }
      .three {
        height: 200px;
        width: 400px;
        background-color: rgb(93, 37, 158);
        border: 2px solid black;
        font-size: 200px;
        text-align: center;
      }
      .four {
        height: 200px;
        width: 400px;
        background-color: rgb(214, 34, 103);
        border: 2px solid black;
        font-size: 200px;
        text-align: center;
      }

      .main {
        height: 1000px;
        border: 4px solid blue;
        display: flex;
        justify-content: space-around;
        align-items: end;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>

<html>
  <head>
    <title>Learn grid</title>
    <style>
      .one {
        height: 300px;
        width: auto;
        background-color: aqua;
        font-size: 200px;
        text-align: center;
      }

      .two {
        height: 300px;
        width: auto;
        background-color: rgb(30, 192, 16);
        font-size: 200px;
        text-align: center;
      }

      .three {
        height: 300px;
        width: auto;
        background-color: rgb(68, 0, 255);
        font-size: 200px;
        text-align: center;
      }
      .four {
        height: 300px;
        width: auto;
        background-color: rgb(255, 0, 149);
        font-size: 200px;
        text-align: center;
      }
      .main {
        display: grid;
        grid-template-columns: 30% 70%;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
    </div>
  </body>
</html>

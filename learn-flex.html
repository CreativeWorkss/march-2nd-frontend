<html>
  <head>
    <title>Learn Flex</title>
    <style>
      .one {
        height: 200px;
        width: 300px;
        background-color: blue;
        border: 2px solid black;
        font-size: 150px;
        text-align: center;
      }
      .two {
        height: 200px;
        width: 300px;
        background-color: rgb(63, 197, 74);
        border: 2px solid black;
        font-size: 150px;
        text-align: center;
      }
      .three {
        height: 200px;
        width: 300px;
        background-color: rgb(238, 138, 23);
        border: 2px solid black;
        font-size: 150px;
        text-align: center;
      }

      .main {
        height: 1000px;
        border: 4px solid blue;
        display: flex;
        justify-content: space-evenly;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>
